<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
  </head>
  <body>
    <form method="POST" id="registerForm">
      <label>Name</label>
      <input type="text" id="name" placeholder="Enter Your name" />

      <label>Email</label>
      <input type="email" id="email" placeholder="Enter Email" />

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter Password" />

      <button>Submit</button>
    </form>

    <script>
      const form = document.getElementById("registerForm");
      const name = document.getElementById("name");
      const email = document.getElementById("email");
      const password = document.getElementById("password");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name2 = name.value;
        const email2 = email.value;
        const password2 = password.value;

        console.log(name2, email2, password2);

        const response = await fetch("http://localhost:7111/api/register", {
          method: "POST",

          body: JSON.stringify({
            //convert the data to JSON Format
            name: name2,
            email: email2,
            password: password2,
          }),

          headers: {
            //Tells backend that its an JSON data
            "Content-Type": "application/json",
          },
        });

        console.log("form Submitted");

        //from frontend sends data to backend and backend reposne the data is collected aand that respose is this
        const data = await response.json();
        console.log(data);

         if (response.ok) {
          console.log("User is registred");
        } else {
          console.log(data.message);
        }
        console.log(response.ok);
        console.log(response.status);
      });
    </script>
  </body>
</html>
